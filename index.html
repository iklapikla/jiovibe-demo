<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JioVibe</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif;}
body{background:#f9f9f9;display:flex;}

/* SIDEBAR */
.sidebar{width:220px;height:100vh;background:#fff;padding:20px;position:fixed;}
.logo{font-size:22px;font-weight:600;color:#ff6600;margin-bottom:30px;}
.menu a{display:flex;padding:12px;margin-bottom:10px;border-radius:10px;text-decoration:none;color:#333;}
.menu a:hover{background:#ffe9dc;color:#ff6600;}

/* MAIN */
.main{margin-left:240px;width:100%;}

/* HEADER */
.header{display:flex;justify-content:space-between;align-items:center;padding:15px 25px;background:#fff;position:sticky;top:0;}
.search-box{width:50%;position:relative;}
.search-box input{width:100%;padding:10px 15px;border-radius:25px;border:1px solid #ddd;}
.suggestions{position:absolute;top:45px;width:100%;background:#fff;border-radius:10px;display:none;}
.suggestions div{padding:10px;cursor:pointer;}
.suggestions div:hover{background:#f2f2f2;}

.profile{display:flex;align-items:center;cursor:pointer;position:relative;}
.profile img{width:35px;height:35px;border-radius:50%;margin-right:10px;}
.dropdown{position:absolute;top:50px;right:0;background:#fff;width:220px;border-radius:12px;display:none;padding:10px;}
.dropdown div{padding:10px;cursor:pointer;}
.dropdown div:hover{background:#f2f2f2;}

/* CATEGORY */
.categories{display:flex;gap:10px;padding:15px 25px;}
.cat{padding:8px 15px;border-radius:20px;background:#eee;cursor:pointer;}
.cat.active{background:#ff6600;color:#fff;}

/* BANNER */
.banner{margin:10px 25px;height:300px;border-radius:18px;overflow:hidden;position:relative;}
.banner-slide{position:absolute;width:100%;height:100%;opacity:0;transition:.5s;background-size:cover;}
.banner-slide.active{opacity:1;}
.banner-content{position:absolute;left:40px;top:50%;transform:translateY(-50%);color:#fff;}
.banner-content h1{font-size:38px;margin:10px 0;}
.banner-content button{background:#ff6600;border:none;padding:10px 20px;color:#fff;border-radius:8px;}

.section{padding:20px;}
.video-row{display:grid;grid-template-columns:repeat(5,1fr);gap:15px;}
.video-card{background:#fff;border-radius:12px;overflow:hidden;cursor:pointer;}
.thumb-wrap{height:130px;position:relative;}
.thumb-wrap img,video{width:100%;height:100%;object-fit:cover;}
.thumb-wrap video{display:none;}
.video-card:hover video{display:block;}
.video-card:hover img{display:none;}
.card-info{padding:10px;font-size:14px;}

</style>
</head>

<body>

<div class="sidebar">
<div class="logo">JioVibe</div>
<div class="menu">
<a href="#">Home</a>
<a href="#">Explore</a>
<a href="#">Live</a>
<a href="#">Video</a>
<a href="#">Shorts</a>
<a href="#">Stories</a>
<a href="#">Community</a>
</div>
</div>

<div class="main">

<div class="header">
<div class="search-box">
<input type="text" placeholder="Search...">
</div>

<div class="profile" onclick="toggleDropdown()">
<img src="https://randomuser.me/api/portraits/women/44.jpg">
<span>Trupti</span>

<div class="dropdown" id="dropdown">
<div>Dashboard</div>
<div>Channel</div>
<div>Wallet</div>
</div>

</div>
</div>

<div class="categories">
<div class="cat active">All</div>
<div class="cat">Gaming</div>
<div class="cat">Music</div>
</div>

<!-- BANNER -->
<div class="banner">
<div class="banner-slide active" style="background-image:url('https://images.unsplash.com/photo-1500530855697-b586d89ba3ee')">
<div class="banner-content">
<h1>Beyond the Limits</h1>
<button>Watch</button>
</div>
</div>
</div>

<!-- VIDEOS -->
<div class="section">
<div class="video-row">

<div class="video-card">
<div class="thumb-wrap">
<img src="https://images.unsplash.com/photo-1542751371-adc38448a05e">
<video muted loop src="https://interactive-examples.mdn.mozilla.net/media/cc0-videos/flower.mp4"></video>
</div>
<div class="card-info">Gaming Video</div>
</div>

<div class="video-card">
<div class="thumb-wrap">
<img src="https://images.unsplash.com/photo-1493225457124-a3eb161ffa5f">
<video muted loop src="https://interactive-examples.mdn.mozilla.net/media/cc0-videos/flower.mp4"></video>
</div>
<div class="card-info">Music Video</div>
</div>

</div>
</div>

</div>

<script>
function toggleDropdown(){
let d=document.getElementById("dropdown");
d.style.display=d.style.display==="block"?"none":"block";
}
</script>

</body>
</html>
