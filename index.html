<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JioVibe Home</title>

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Inter, Arial, sans-serif;
}

body{
  background:#fff;
  color:#222;
  overflow-x:hidden;
}

:root{
  --orange:#ff5b12;
  --light-orange:#fff1ea;
  --border:#eceff5;
  --muted:#7b8190;
  --shadow:0 12px 32px rgba(0,0,0,.08);
}

.app{
  display:flex;
  min-height:100vh;
}

/* SIDEBAR */
.sidebar{
  width:250px;
  background:#fff;
  border-right:1px solid var(--border);
  padding:34px 24px;
  position:fixed;
  left:0;
  top:0;
  bottom:0;
  z-index:20;
}

.logo{
  display:flex;
  align-items:center;
  gap:0;
  margin-bottom:42px;
}

.logo-circle{
  background:#ff7900;
  color:#fff;
  width:58px;
  height:58px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:900;
  font-size:26px;
}

.logo-text{
  font-size:34px;
  font-weight:900;
  color:#250008;
  letter-spacing:-2px;
}

.nav{
  display:flex;
  flex-direction:column;
  gap:14px;
}

.nav-item{
  display:flex;
  align-items:center;
  gap:20px;
  height:58px;
  padding:0 22px;
  border-radius:14px;
  cursor:pointer;
  color:#2f333b;
  font-weight:700;
  transition:.25s;
}

.nav-item i{
  width:22px;
  font-size:21px;
}

.nav-item:hover,
.nav-item.active{
  background:var(--light-orange);
  color:var(--orange);
}

.nav-line{
  height:1px;
  background:var(--border);
  margin:22px 0;
}

/* MAIN */
.main{
  margin-left:250px;
  width:calc(100% - 250px);
  min-height:100vh;
}

.topbar{
  height:94px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 48px;
  border-bottom:1px solid var(--border);
  background:#fff;
  position:sticky;
  top:0;
  z-index:15;
}

.search-wrap{
  width:54%;
  position:relative;
}

.search-box{
  height:54px;
  border:1px solid var(--border);
  border-radius:30px;
  display:flex;
  align-items:center;
  gap:16px;
  padding:0 22px;
  box-shadow:0 2px 8px rgba(0,0,0,.03);
}

.search-box i{
  color:#969baa;
  font-size:20px;
}

.search-box input{
  border:none;
  outline:none;
  width:100%;
  font-size:16px;
  color:#333;
}

.suggestions{
  display:none;
  position:absolute;
  top:62px;
  left:0;
  right:0;
  background:#fff;
  border:1px solid var(--border);
  border-radius:18px;
  box-shadow:var(--shadow);
  padding:10px;
  z-index:40;
}

.suggestion{
  padding:14px 18px;
  border-radius:12px;
  cursor:pointer;
  display:flex;
  gap:14px;
  align-items:center;
  color:#3a3f49;
  font-weight:600;
}

.suggestion:hover{
  background:#f8f8f8;
}

.profile-area{
  display:flex;
  align-items:center;
  gap:24px;
}

.bell{
  position:relative;
  font-size:22px;
  cursor:pointer;
}

.bell span{
  position:absolute;
  top:-8px;
  right:-8px;
  background:var(--orange);
  color:#fff;
  font-size:10px;
  width:17px;
  height:17px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
}

.profile{
  display:flex;
  align-items:center;
  gap:12px;
  cursor:pointer;
  position:relative;
}

.profile img{
  width:46px;
  height:46px;
  border-radius:50%;
  object-fit:cover;
}

.profile strong{
  font-size:15px;
}

/* DROPDOWN */
.dropdown{
  display:none;
  position:absolute;
  top:72px;
  right:0;
  width:390px;
  background:#fff;
  border:1px solid var(--border);
  border-radius:20px;
  box-shadow:0 20px 50px rgba(0,0,0,.15);
  padding:30px;
  z-index:60;
}

.dropdown::before{
  content:"";
  position:absolute;
  top:-12px;
  right:150px;
  width:24px;
  height:24px;
  background:#fff;
  transform:rotate(45deg);
  border-left:1px solid var(--border);
  border-top:1px solid var(--border);
}

.drop-head{
  display:flex;
  align-items:center;
  gap:18px;
  margin-bottom:22px;
}

.drop-head img{
  width:76px;
  height:76px;
  border-radius:50%;
  object-fit:cover;
}

.drop-head h3{
  font-size:24px;
}

.drop-head p{
  color:var(--orange);
  font-weight:700;
  margin-top:5px;
}

.drop-item{
  height:58px;
  display:flex;
  align-items:center;
  gap:22px;
  padding:0 20px;
  border-radius:14px;
  cursor:pointer;
  font-size:19px;
  font-weight:700;
}

.drop-item:hover,
.drop-item.hot{
  background:var(--light-orange);
  color:var(--orange);
}

.drop-item i{
  width:24px;
}

.content{
  padding:28px 48px 60px;
}

  /* CATEGORY */
.categories{
  display:flex;
  align-items:center;
  gap:20px;
  margin-bottom:26px;
  overflow-x:auto;
  padding-bottom:4px;
}

.cat{
  min-width:max-content;
  height:48px;
  padding:0 26px;
  border:1px solid var(--border);
  border-radius:22px;
  display:flex;
  align-items:center;
  gap:12px;
  font-weight:700;
  cursor:pointer;
  background:#fff;
  transition:.2s;
}

.cat.active,
.cat:hover{
  background:var(--orange);
  color:#fff;
  border-color:var(--orange);
}

/* HERO */
.hero{
  height:320px;
  border-radius:14px;
  overflow:hidden;
  position:relative;
  background:#111;
  margin-bottom:34px;
}

.hero-slide{
  position:absolute;
  inset:0;
  background-size:cover;
  background-position:center;
  opacity:0;
  transition:1s;
}

.hero-slide.active{
  opacity:1;
}

.hero-slide::after{
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(90deg,rgba(0,0,0,.9),rgba(0,0,0,.45),rgba(0,0,0,.05));
}

.hero-info{
  position:absolute;
  z-index:2;
  left:45px;
  top:40px;
  color:#fff;
  width:430px;
}

.hero-info small{
  color:var(--orange);
  font-weight:900;
  letter-spacing:.5px;
  font-size:15px;
}

.hero-info h1{
  font-size:46px;
  line-height:1.08;
  margin:18px 0 14px;
}

.hero-info p{
  color:#e8e8e8;
  font-size:19px;
  line-height:1.5;
}

.watch-btn{
  margin-top:28px;
  background:var(--orange);
  color:#fff;
  border:none;
  height:56px;
  padding:0 26px;
  border-radius:10px;
  font-size:17px;
  font-weight:800;
  cursor:pointer;
}

.hero-dots{
  position:absolute;
  left:45px;
  bottom:28px;
  display:flex;
  gap:10px;
  z-index:3;
}

.hero-dot{
  width:22px;
  height:4px;
  background:#ddd;
  border-radius:8px;
}

.hero-dot.active{
  background:var(--orange);
  width:32px;
}

/* SECTION */
.section{
  margin-top:28px;
}

.section-head{
  display:flex;
  align-items:center;
  justify-content:space-between;
  margin-bottom:18px;
}

.section-head h2{
  font-size:22px;
}

.section-head button{
  border:none;
  background:none;
  color:var(--orange);
  font-size:15px;
  font-weight:800;
  cursor:pointer;
}

.video-row{
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:22px;
}

.video-card{
  background:#fff;
  border-radius:10px;
  cursor:pointer;
  overflow:hidden;
  transition:.25s;
}

.video-card:hover{
  transform:translateY(-4px);
  box-shadow:var(--shadow);
}

.thumb{
  height:125px;
  border-radius:10px;
  overflow:hidden;
  position:relative;
  background:#ddd;
}

.thumb img,
.thumb video{
  width:100%;
  height:100%;
  object-fit:cover;
}

.thumb video{
  display:none;
}

.video-card:hover .thumb video{
  display:block;
}

.video-card:hover .thumb img{
  display:none;
}

.duration,
.live-badge,
.views-badge{
  position:absolute;
  right:8px;
  bottom:8px;
  background:rgba(0,0,0,.75);
  color:#fff;
  font-size:12px;
  padding:4px 7px;
  border-radius:4px;
  font-weight:700;
}

.live-badge{
  left:8px;
  right:auto;
  background:var(--orange);
}

.views-badge{
  right:8px;
  top:8px;
  bottom:auto;
}

.card-body{
  padding:12px 8px 14px;
}

.card-body h3{
  font-size:16px;
  line-height:1.25;
  margin-bottom:6px;
}

.card-body p{
  color:#666b75;
  font-size:14px;
  line-height:1.4;
}

.verify{
  color:var(--orange);
  font-size:12px;
}

/* Recommended */
.recommended-grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:24px;
}

.big-card{
  border:1px solid var(--border);
  border-radius:12px;
  overflow:hidden;
  cursor:pointer;
  background:#fff;
}

.big-card .thumb{
  height:170px;
  border-radius:0;
}

.big-card .card-body{
  padding:13px 16px;
}

.hidden-extra{
  display:none;
}

  /* PAGE PANELS */
.page-panel{
  display:none;
}

.page-panel.active{
  display:block;
}

.fake-page{
  padding:40px;
  border:1px solid var(--border);
  border-radius:18px;
  background:#fff;
  box-shadow:var(--shadow);
}

.fake-page h1{
  font-size:36px;
  margin-bottom:12px;
}

.fake-page p{
  color:#666;
  font-size:18px;
}

/* SHORTS / STORIES / COMMUNITY */
.short-layout,
.story-layout,
.community-layout{
  display:grid;
  grid-template-columns:1fr 420px;
  gap:34px;
}

.short-player,
.story-player{
  width:520px;
  max-width:100%;
  height:760px;
  margin:auto;
  border-radius:28px;
  overflow:hidden;
  position:relative;
  box-shadow:0 24px 70px rgba(0,0,0,.22);
  background:#000;
}

.short-player img,
.story-player img{
  width:100%;
  height:100%;
  object-fit:cover;
}

.short-player::after,
.story-player::after{
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(180deg,transparent 50%,rgba(0,0,0,.65));
}

.short-info{
  position:absolute;
  left:28px;
  right:28px;
  bottom:42px;
  z-index:2;
  color:#fff;
}

.short-actions{
  position:absolute;
  right:-86px;
  top:240px;
  display:flex;
  flex-direction:column;
  gap:18px;
}

.short-action{
  width:68px;
  height:78px;
  border-radius:14px;
  background:#fff;
  box-shadow:var(--shadow);
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:8px;
  font-weight:800;
  cursor:pointer;
}

.short-action i{
  color:var(--orange);
  font-size:25px;
}

.side-card{
  background:#fff;
  border:1px solid var(--border);
  border-radius:18px;
  padding:24px;
  box-shadow:var(--shadow);
}

.side-card h2{
  margin-bottom:22px;
}

.side-list{
  display:flex;
  flex-direction:column;
  gap:22px;
}

.side-user{
  display:flex;
  align-items:center;
  gap:14px;
}

.side-user img{
  width:64px;
  height:64px;
  border-radius:16px;
  object-fit:cover;
}

.community-layout{
  grid-template-columns:1fr 390px;
}

.post-box,
.post-card{
  background:#fff;
  border:1px solid var(--border);
  border-radius:18px;
  padding:22px;
  margin-bottom:22px;
}

.post-top{
  display:flex;
  align-items:center;
  gap:14px;
}

.post-top img{
  width:56px;
  height:56px;
  border-radius:50%;
  object-fit:cover;
}

.post-actions{
  display:flex;
  gap:14px;
  margin-top:18px;
}

.post-actions button,
.follow-btn{
  border:1px solid var(--border);
  background:#fff;
  padding:11px 24px;
  border-radius:12px;
  font-weight:800;
  cursor:pointer;
}

.post-img{
  width:100%;
  height:270px;
  border-radius:14px;
  object-fit:cover;
  margin:18px 0;
}

/* MODAL */
.modal{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.45);
  z-index:100;
  align-items:center;
  justify-content:center;
  padding:30px;
}

.modal-box{
  width:92%;
  max-width:1320px;
  max-height:92vh;
  overflow:auto;
  background:#fff;
  border-radius:20px;
  position:relative;
}

.close{
  position:absolute;
  right:20px;
  top:16px;
  background:#fff;
  border:none;
  width:42px;
  height:42px;
  border-radius:50%;
  font-size:22px;
  cursor:pointer;
  z-index:5;
}

.video-detail{
  display:grid;
  grid-template-columns:1fr 390px;
  gap:24px;
  padding:28px;
}

.player{
  height:500px;
  background:#111;
  border-radius:16px;
  overflow:hidden;
  position:relative;
}

.player img{
  width:100%;
  height:100%;
  object-fit:cover;
}

.player-controls{
  position:absolute;
  left:0;
  right:0;
  bottom:0;
  height:76px;
  background:linear-gradient(transparent,rgba(0,0,0,.85));
  color:#fff;
  display:flex;
  align-items:end;
  gap:20px;
  padding:20px;
  font-size:22px;
}

.detail-title{
  font-size:26px;
  margin:18px 0 10px;
}

.creator-row{
  display:flex;
  align-items:center;
  justify-content:space-between;
  border-bottom:1px solid var(--border);
  padding-bottom:18px;
}

.creator-left{
  display:flex;
  align-items:center;
  gap:14px;
}

.creator-left img{
  width:58px;
  height:58px;
  border-radius:50%;
  object-fit:cover;
}

.orange-btn{
  background:var(--orange);
  color:#fff;
  border:none;
  border-radius:12px;
  height:50px;
  padding:0 28px;
  font-weight:900;
  cursor:pointer;
}

.action-row{
  display:flex;
  gap:14px;
  margin:18px 0;
  flex-wrap:wrap;
}

.action-btn{
  height:48px;
  border:1px solid var(--border);
  background:#fff;
  border-radius:14px;
  padding:0 22px;
  font-weight:800;
  cursor:pointer;
}

.action-btn.active{
  color:var(--orange);
  background:var(--light-orange);
}
