<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JioVibe</title>

<!-- FONT -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter',sans-serif;
}

body{
background:#f9f9f9;
display:flex;
}

/* SIDEBAR */
.sidebar{
width:220px;
height:100vh;
background:#fff;
padding:20px;
position:fixed;
}

.logo{
font-size:22px;
font-weight:600;
color:#ff6600;
margin-bottom:30px;
}

.menu a{
display:flex;
align-items:center;
padding:12px;
margin-bottom:10px;
border-radius:10px;
text-decoration:none;
color:#333;
}

.menu a:hover{
background:#ffe9dc;
color:#ff6600;
}

/* MAIN */
.main{
margin-left:240px;
width:100%;
}

/* HEADER */
.header{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 25px;
background:#fff;
position:sticky;
top:0;
z-index:10;
}

/* SEARCH */
.search-box{
width:50%;
position:relative;
}

.search-box input{
width:100%;
padding:10px 15px;
border-radius:25px;
border:1px solid #ddd;
outline:none;
}

/* SUGGESTIONS */
.suggestions{
position:absolute;
top:45px;
width:100%;
background:#fff;
border-radius:10px;
box-shadow:0 4px 15px rgba(0,0,0,0.1);
display:none;
}

.suggestions div{
padding:10px;
cursor:pointer;
}

.suggestions div:hover{
background:#f2f2f2;
}

/* PROFILE */
.profile{
display:flex;
align-items:center;
cursor:pointer;
position:relative;
}

.profile img{
width:35px;
height:35px;
border-radius:50%;
margin-right:10px;
}

/* DROPDOWN */
.dropdown{
position:absolute;
top:50px;
right:0;
background:#fff;
width:220px;
border-radius:12px;
box-shadow:0 4px 15px rgba(0,0,0,0.15);
display:none;
padding:10px;
}

.dropdown div{
padding:10px;
cursor:pointer;
border-radius:8px;
}

.dropdown div:hover{
background:#f2f2f2;
}

/* CATEGORY BAR */
.categories{
display:flex;
gap:10px;
padding:15px 25px;
}

.cat{
padding:8px 15px;
border-radius:20px;
background:#eee;
cursor:pointer;
}

.cat.active{
background:#ff6600;
color:#fff;
}

</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
<div class="logo">JioVibe</div>

<div class="menu">
<a href="index.html">Home</a>
<a href="explore.html">Explore</a>
<a href="live.html">Live</a>
<a href="video.html">Video</a>
<a href="shorts.html">Shorts</a>
<a href="stories.html">Stories</a>
<a href="community.html">Community</a>
<a href="subscriptions.html">Subscriptions</a>
</div>
</div>

<!-- MAIN -->
<div class="main">

<!-- HEADER -->
<div class="header">

<div class="search-box">
<input type="text" id="search" placeholder="Search creators, videos...">
<div class="suggestions" id="suggestions"></div>
</div>

<div class="profile" onclick="toggleDropdown()">
<img src="https://randomuser.me/api/portraits/women/44.jpg">
<span>Trupti Latur</span>

<div class="dropdown" id="dropdown">
<div onclick="goPage('dashboard.html')">Go to Dashboard</div>
<div onclick="goPage('channel.html')">My Channel</div>
<div onclick="goPage('ai-studio.html')">AI Studio</div>
<div onclick="goPage('wallet.html')">Wallet</div>
<div onclick="goPage('settings.html')">Settings</div>
<div>Logout</div>
</div>

</div>

</div>

<!-- CATEGORY -->
<div class="categories">
<div class="cat active">All</div>
<div class="cat">Gaming</div>
<div class="cat">Music</div>
<div class="cat">Comedy</div>
<div class="cat">Tech</div>
<div class="cat">Education</div>
<div class="cat">Lifestyle</div>
</div>
