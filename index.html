<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>JioVibe - Home</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    *{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif}
    body{background:#fff;color:#222;overflow-x:hidden}
    a{text-decoration:none;color:inherit}

    :root{
      --orange:#ff5a00;
      --light:#fff3ee;
      --border:#eceff3;
      --text:#1f2328;
      --muted:#7a7f89;
      --shadow:0 12px 35px rgba(20,20,20,.08);
    }

    .app{display:flex;min-height:100vh}

    /* SIDEBAR */
    .sidebar{
      width:250px;
      height:100vh;
      position:fixed;
      left:0;top:0;
      background:#fff;
      border-right:1px solid var(--border);
      padding:32px 24px;
      z-index:20;
    }

    .logo{
      display:flex;align-items:center;
      margin-bottom:45px;
      font-size:32px;
      font-weight:800;
      color:#250008;
    }
    .logo-circle{
      background:var(--orange);
      color:#fff;
      width:54px;height:54px;
      border-radius:50%;
      display:flex;align-items:center;justify-content:center;
      font-weight:800;
      margin-right:2px;
    }

    .nav-item{
      display:flex;align-items:center;
      gap:16px;
      padding:15px 20px;
      border-radius:14px;
      color:#333;
      font-size:16px;
      font-weight:600;
      margin-bottom:12px;
      cursor:pointer;
      transition:.25s;
    }
    .nav-item i{font-size:20px;width:22px;text-align:center}
    .nav-item:hover,.nav-item.active{
      background:var(--light);
      color:var(--orange);
    }
    .nav-divider{height:1px;background:var(--border);margin:28px 0}

    /* MAIN */
    .main{
      margin-left:250px;
      width:calc(100% - 250px);
      min-height:100vh;
    }

    /* HEADER */
    .header{
      height:92px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding:0 42px;
      border-bottom:1px solid var(--border);
      background:#fff;
      position:sticky;
      top:0;
      z-index:15;
    }

    .search-wrap{
      position:relative;
      width:56%;
      max-width:720px;
    }
    .search-box{
      width:100%;
      height:52px;
      border:1px solid #e5e8ef;
      border-radius:28px;
      display:flex;
      align-items:center;
      padding:0 22px;
      gap:14px;
      background:#fff;
      box-shadow:0 2px 10px rgba(0,0,0,.03);
    }
    .search-box i{color:#9aa0aa;font-size:20px}
    .search-box input{
      border:none;outline:none;width:100%;
      font-size:15px;
      color:#333;
    }

    .suggestions{
      display:none;
      position:absolute;
      top:60px;left:0;
      width:100%;
      background:#fff;
      border:1px solid var(--border);
      border-radius:18px;
      box-shadow:var(--shadow);
      overflow:hidden;
      z-index:50;
    }
    .suggestion{
      padding:14px 20px;
      display:flex;
      gap:12px;
      align-items:center;
      cursor:pointer;
      font-weight:500;
    }
    .suggestion:hover{background:#fff5ef;color:var(--orange)}

    .top-actions{
      display:flex;align-items:center;gap:24px;position:relative;
    }
    .bell{
      position:relative;
      font-size:22px;
      cursor:pointer;
    }
    .bell::after{
      content:'';
      position:absolute;
      right:-2px;top:-2px;
      width:9px;height:9px;
      background:var(--orange);
      border-radius:50%;
    }

    .profile{
      display:flex;align-items:center;gap:12px;
      cursor:pointer;
      padding:8px;
      border-radius:20px;
    }
    .profile img{
      width:46px;height:46px;
      border-radius:50%;
      object-fit:cover;
    }
    .profile span{font-weight:700}
    .profile i{color:#777}

    .dropdown{
      display:none;
      position:absolute;
      right:0;
      top:70px;
      width:420px;
      background:#fff;
      border-radius:20px;
      box-shadow:0 18px 40px rgba(0,0,0,.14);
      padding:28px;
      z-index:100;
    }
    .dropdown::before{
      content:'';
      position:absolute;
      top:-12px;
      right:120px;
      width:26px;height:26px;
      background:#fff;
      transform:rotate(45deg);
    }
    .drop-head{
      display:flex;align-items:center;gap:18px;margin-bottom:24px;
    }
    .drop-head img{
      width:78px;height:78px;border-radius:50%;object-fit:cover;
    }
    .drop-head h3{font-size:22px;margin-bottom:4px}
    .drop-head p{color:var(--orange);font-weight:600}
    .drop-item{
      display:flex;align-items:center;gap:18px;
      padding:16px 20px;
      border-radius:14px;
      font-size:18px;
      font-weight:600;
      cursor:pointer;
      margin-bottom:6px;
    }
    .drop-item:hover,.drop-item.highlight{
      background:#fff2eb;color:var(--orange);
    }
    .drop-item i{width:24px;text-align:center;font-size:21px}
    .drop-line{height:1px;background:var(--border);margin:14px 0}

    /* CONTENT */
    .content{
      padding:28px 42px 50px;
    }

    .categories{
      display:flex;
      align-items:center;
      gap:18px;
      margin-bottom:26px;
      overflow-x:auto;
      padding-bottom:6px;
    }
    .cat{
      min-width:max-content;
      padding:13px 24px;
      border:1px solid #e7ebf1;
      border-radius:20px;
      font-size:15px;
      font-weight:700;
      display:flex;
      gap:10px;
      align-items:center;
      cursor:pointer;
      background:#fff;
      transition:.25s;
    }
    .cat:hover,.cat.active{
      background:var(--orange);
      color:#fff;
      border-color:var(--orange);
    }

    /* BANNER */
    .banner{
      height:330px;
      border-radius:16px;
      overflow:hidden;
      position:relative;
      box-shadow:0 8px 18px rgba(0,0,0,.08);
      margin-bottom:32px;
      background:#111;
    }
    .banner-slide{
      position:absolute;
      inset:0;
      opacity:0;
      transition:1s;
      background-size:cover;
      background-position:center;
    }
    .banner-slide.active{opacity:1}
    .banner-slide::after{
      content:'';
      position:absolute;
      inset:0;
      background:linear-gradient(90deg,rgba(0,0,0,.82),rgba(0,0,0,.35),rgba(0,0,0,.05));
    }
    .banner-text{
      position:absolute;
      left:46px;
      top:42px;
      z-index:2;
      color:#fff;
      max-width:420px;
    }
    .banner-text small{
      color:var(--orange);
      font-weight:800;
      letter-spacing:.8px;
      font-size:16px;
    }
    .banner-text h1{
      font-size:44px;
      line-height:1.1;
      margin:16px 0;
    }
    .banner-text p{
      color:#e9e9e9;
      font-size:18px;
      line-height:1.6;
      margin-bottom:28px;
    }
    .watch-btn{
      border:none;
      background:var(--orange);
      color:#fff;
      padding:15px 24px;
      font-size:16px;
      font-weight:800;
      border-radius:10px;
      cursor:pointer;
    }
    .dots{
      position:absolute;
      left:46px;
      bottom:28px;
      z-index:3;
      display:flex;
      gap:10px;
    }
    .dot{
      width:22px;height:4px;
      background:#aaa;
      border-radius:10px;
    }
    .dot.active{background:var(--orange)}

    .section{
      margin-bottom:34px;
    }
    .section-head{
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-bottom:18px;
    }
    .section-head h2{
      font-size:22px;
      font-weight:800;
    }
    .section-head button{
      border:none;background:none;
      color:var(--orange);
      font-size:15px;
      font-weight:800;
      cursor:pointer;
    }

    .video-row{
      display:grid;
      grid-template-columns:repeat(5,1fr);
      gap:18px;
    }
    .video-grid{
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:22px;
    }

    .video-card{
      background:#fff;
      border-radius:14px;
      overflow:hidden;
      cursor:pointer;
      transition:.25s;
      position:relative;
    }
    .video-card:hover{
      transform:translateY(-3px);
      box-shadow:0 12px 30px rgba(0,0,0,.08);
    }

    .thumb{
      position:relative;
      height:118px;
      border-radius:12px;
      overflow:hidden;
      background:#ddd;
    }
    .video-grid .thumb{height:175px}
    .thumb img,.thumb video{
      width:100%;height:100%;
      object-fit:cover;
      position:absolute;inset:0;
    }
    .thumb video{
      display:none;
      background:#000;
    }
    .video-card:hover video{display:block}
    .video-card:hover img{display:none}

    .duration,.live-tag,.views-tag{
      position:absolute;
      right:8px;bottom:8px;
      background:rgba(0,0,0,.75);
      color:#fff;
      padding:4px 8px;
      border-radius:6px;
      font-size:12px;
      font-weight:700;
      z-index:3;
    }
    .live-tag{
      left:8px;right:auto;
      background:var(--orange);
    }
    .views-tag{
      right:8px;top:8px;bottom:auto;
    }

    .card-body{
      padding:12px 8px 14px;
    }
    .card-title{
      font-weight:800;
      font-size:15px;
      margin-bottom:6px;
      line-height:1.3;
    }
    .creator{
      color:#6f7480;
      font-size:14px;
      font-weight:500;
    }
    .verify{
      color:var(--orange);
      font-size:12px;
      margin-left:4px;
    }
    .meta{
      color:#828894;
      font-size:13px;
      margin-top:4px;
    }

    .hidden-card{display:none}

    /* RESPONSIVE */
    @media(max-width:1200px){
      .video-row{grid-template-columns:repeat(3,1fr)}
      .video-grid{grid-template-columns:repeat(2,1fr)}
    }
    @media(max-width:800px){
      .sidebar{width:82px;padding:20px 12px}
      .logo{font-size:0;margin-bottom:35px}
      .logo-circle{margin:auto}
      .nav-item span{display:none}
      .nav-item{justify-content:center;padding:15px}
      .main{margin-left:82px;width:calc(100% - 82px)}
      .header{padding:0 18px}
      .search-wrap{width:55%}
      .profile span{display:none}
      .content{padding:22px 18px}
      .video-row
