<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>JioVibe - Explore</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
:root{
  --orange:#ff6a00;
  --bg:#fafafa;
}

body{
  margin:0;
  font-family:Arial, sans-serif;
  background:var(--bg);
}

.jv-layout{display:flex}

/* SIDEBAR */
.jv-sidebar{
  width:230px;
  background:white;
  height:100vh;
  position:fixed;
  padding:20px;
  border-right:1px solid #eee;
}

.jv-logo{
  font-size:28px;
  font-weight:900;
  margin-bottom:30px;
  cursor:pointer;
}

.jv-nav-item{
  padding:12px;
  border-radius:10px;
  cursor:pointer;
  margin-bottom:8px;
}

.jv-nav-item:hover,
.active{
  background:#fff1e8;
  color:var(--orange);
  font-weight:bold;
}

/* MAIN */
.jv-main{
  margin-left:230px;
  width:calc(100% - 230px);
}

/* TOPBAR */
.jv-topbar{
  height:80px;
  background:white;
  display:flex;
  align-items:center;
  justify-content:center;
  border-bottom:1px solid #eee;
}

.jv-search{
  width:50%;
  padding:12px;
  border-radius:25px;
  border:1px solid #ddd;
}

/* CONTENT */
.jv-content{padding:30px}

.jv-title{
  font-size:24px;
  font-weight:bold;
  margin-bottom:20px;
}

/* GRID */
.jv-grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:20px;
}

.jv-card{
  background:white;
  border-radius:12px;
  overflow:hidden;
  box-shadow:0 5px 15px rgba(0,0,0,0.05);
}

.jv-thumb{
  height:180px;
  background-size:cover;
  cursor:pointer;
}

.jv-body{padding:10px}

.jv-actions{
  display:flex;
  gap:10px;
  margin-top:10px;
}

.jv-btn{
  border:1px solid #ddd;
  border-radius:20px;
  padding:6px 12px;
  cursor:pointer;
}

.jv-btn.active{
  background:#fff1e8;
  color:var(--orange);
}

</style>
</head>

<body>

<div class="jv-layout">

<!-- SIDEBAR -->
<div class="jv-sidebar">
  <div class="jv-logo" onclick="go('index.html')">JioVibe</div>

  <div class="jv-nav-item" onclick="go('index.html')">🏠 Home</div>
  <div class="jv-nav-item active">🔎 Explore</div>
  <div class="jv-nav-item" onclick="go('live.html')">📡 Live</div>
  <div class="jv-nav-item" onclick="go('shorts.html')">⚡ Shorts</div>
  <div class="jv-nav-item" onclick="go('stories.html')">⭕ Stories</div>
  <div class="jv-nav-item" onclick="go('community.html')">💬 Community</div>
</div>

<!-- MAIN -->
<div class="jv-main">

  <div class="jv-topbar">
    <input class="jv-search" placeholder="Search creators, videos...">
  </div>

  <div class="jv-content">

    <div class="jv-title">Explore Trending Content 🔥</div>

    <div class="jv-grid">

      <!-- CARD -->
      <div class="jv-card">
        <div class="jv-thumb" onclick="go('video.html')" style="background-image:url('https://images.unsplash.com/photo-1542751371-adc38448a05e')"></div>
        <div class="jv-body">
          <b>Gaming Highlights</b>
          <div class="jv-actions">
            <div class="jv-btn" onclick="like(this)">❤️ 1.2K</div>
            <div class="jv-btn" onclick="save(this)">Save</div>
          </div>
        </div>
      </div>

      <div class="jv-card">
        <div class="jv-thumb" onclick="go('video.html')" style="background-image:url('https://images.unsplash.com/photo-1516280440614-37939bbacd81')"></div>
        <div class="jv-body">
          <b>Music Night</b>
          <div class="jv-actions">
            <div class="jv-btn" onclick="like(this)">❤️ 980</div>
            <div class="jv-btn" onclick="save(this)">Save</div>
          </div>
        </div>
      </div>

      <div class="jv-card">
        <div class="jv-thumb" onclick="go('video.html')" style="background-image:url('https://images.unsplash.com/photo-1529156069898-49953e39b3ac')"></div>
        <div class="jv-body">
          <b>Comedy Clips</b>
          <div class="jv-actions">
            <div class="jv-btn" onclick="like(this)">❤️ 2K</div>
            <div class="jv-btn" onclick="save(this)">Save</div>
          </div>
        </div>
      </div>

    </div>

  </div>
</div>
</div>

<script>
function go(page){
  window.location.href = page;
}

function like(btn){
  btn.classList.toggle("active");
}

function save(btn){
  btn.innerText = btn.innerText === "Save" ? "Saved" : "Save";
}
</script>

</body>
</html>
